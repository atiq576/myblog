<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Post | My Blog</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-family: Arial, sans-serif; font-size: 0.9rem; color: #444; }
    input[type="text"], textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid #ccc; border-radius: 4px;
      font-size: 1rem; font-family: Georgia, serif;
    }
    textarea { height: 180px; resize: vertical; }
    .submit-btn {
      background: #222; color: #fff;
      border: none; padding: 12px 28px;
      font-size: 1rem; border-radius: 4px;
      cursor: pointer;
    }
    .submit-btn:hover { background: #444; }
    .notice {
      background: #f0f7ff; border-left: 4px solid #1a1a8c;
      padding: 14px 18px; margin-bottom: 32px;
      font-family: Arial, sans-serif; font-size: 0.88rem; color: #333;
      border-radius: 0 4px 4px 0;
    }
    .sql-box {
      background: #1e1e1e; color: #9cdcfe;
      padding: 20px; border-radius: 6px;
      font-family: monospace; font-size: 0.9rem;
      white-space: pre; margin-top: 32px; display: none;
    }
    .sql-box .kw { color: #569cd6; }
    .sql-box .str { color: #ce9178; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="blog.html">Blog</a>
    <a href="about.html">About</a>
    <a href="admin.html" style="margin-left:auto; background:#222; color:#fff; padding:6px 14px; border-radius:4px;">+ Add Post</a>
  </nav>

  <main>
    <h1>Add New Post</h1>

    <div class="notice">
      📌 This form generates the <strong>MySQL INSERT query</strong> for your post.
      Copy it and run it in <strong>MySQL Workbench</strong> to save it to your database.
    </div>

    <div class="form-group">
      <label>Post Title</label>
      <input type="text" id="title" placeholder="Enter post title..." />
    </div>
    <div class="form-group">
      <label>Author</label>
      <input type="text" id="author" placeholder="Your name..." />
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="text" id="date" placeholder="e.g. April 5, 2026" />
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="content" placeholder="Write your post content here..."></textarea>
    </div>

    <button class="submit-btn" onclick="generateSQL()">Generate MySQL Query →</button>

    <div class="sql-box" id="sqlBox"></div>
  </main>

  <footer><p>© 2026 My Blog</p></footer>

  <script>
    function generateSQL() {
      const title   = document.getElementById('title').value.replace(/'/g, "''");
      const author  = document.getElementById('author').value.replace(/'/g, "''");
      const date    = document.getElementById('date').value.replace(/'/g, "''");
      const content = document.getElementById('content').value.replace(/'/g, "''");

      if (!title || !author || !content) {
        alert('Please fill in Title, Author, and Content.');
        return;
      }

      const sql = `-- Run this in MySQL Workbench
USE lab_db;

INSERT INTO blog_posts (title, author, post_date, content)
VALUES (
  '${title}',
  '${author}',
  '${date}',
  '${content}'
);

SELECT * FROM blog_posts;`;

      const box = document.getElementById('sqlBox');
      box.style.display = 'block';
      box.textContent = sql;
      box.scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
